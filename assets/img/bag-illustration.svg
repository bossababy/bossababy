<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" role="img" aria-label="Illustration of the Bossababy bag: a structured satchel with rolled handles and a quilted front zip pocket">
  <defs>
    <linearGradient id="bagBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c3b3a5"/>
      <stop offset="100%" stop-color="#b0a092"/>
    </linearGradient>
    <linearGradient id="pocketFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2dacb"/>
      <stop offset="100%" stop-color="#d6cdbc"/>
    </linearGradient>
    <!-- diamond quilting -->
    <pattern id="quilt" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M0 26 L26 0" stroke="#bfae9d" stroke-width="1.3" fill="none"/>
      <path d="M0 0 L26 26" stroke="#bfae9d" stroke-width="1.3" fill="none"/>
    </pattern>
    <clipPath id="pocketClip">
      <rect x="112" y="212" width="196" height="106" rx="14"/>
    </clipPath>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="210" cy="336" rx="155" ry="14" fill="#494b4d" opacity="0.10"/>

  <!-- back rolled handle -->
  <path d="M150 152 C150 88, 270 88, 270 152" fill="none" stroke="#8f7b69" stroke-width="15" stroke-linecap="round"/>
  <!-- front rolled handle -->
  <path d="M134 152 C134 80, 254 80, 254 152" fill="none" stroke="#a18b77" stroke-width="15" stroke-linecap="round"/>
  <path d="M134 152 C134 80, 254 80, 254 152" fill="none" stroke="#b5a194" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- detachable shoulder strap hanging behind, left side -->
  <path d="M96 170 C70 200, 64 250, 78 300" fill="none" stroke="#a18b77" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <circle cx="96" cy="170" r="5.5" fill="none" stroke="#8c7866" stroke-width="3"/>

  <!-- bag body: structured satchel, slight flare to the base -->
  <path d="M98 156
           Q98 148 106 148
           L314 148
           Q322 148 322 156
           L334 296
           Q336 322 308 322
           L112 322
           Q84 322 86 296 Z"
        fill="url(#bagBody)"/>

  <!-- top zipper line -->
  <line x1="106" y1="160" x2="314" y2="160" stroke="#94836f" stroke-width="2" stroke-dasharray="2.5 4" stroke-linecap="round" opacity="0.8"/>

  <!-- embroidered wordmark on front panel -->
  <text x="210" y="196" text-anchor="middle" font-family="Didot, 'Bodoni MT', Georgia, serif" font-style="italic" font-size="19" letter-spacing="0.5" fill="#7e6c5c">bossababy</text>

  <!-- quilted front zip pocket -->
  <rect x="112" y="212" width="196" height="106" rx="14" fill="url(#pocketFace)"/>
  <g clip-path="url(#pocketClip)">
    <rect x="112" y="212" width="196" height="106" fill="url(#quilt)"/>
  </g>
  <rect x="112" y="212" width="196" height="106" rx="14" fill="none" stroke="#a99685" stroke-width="2"/>

  <!-- pocket zipper track -->
  <line x1="120" y1="224" x2="300" y2="224" stroke="#94836f" stroke-width="2.5" stroke-dasharray="2.5 3.5" stroke-linecap="round"/>
  <!-- double zipper pulls meeting at centre -->
  <g stroke="#8c7866" fill="#cbbba9">
    <line x1="204" y1="224" x2="198" y2="244" stroke-width="2.5"/>
    <rect x="193" y="244" width="9" height="20" rx="4" stroke-width="2"/>
    <line x1="216" y1="224" x2="222" y2="244" stroke-width="2.5"/>
    <rect x="218" y="244" width="9" height="20" rx="4" stroke-width="2"/>
  </g>

  <!-- side strap ring, right -->
  <circle cx="324" cy="170" r="5.5" fill="none" stroke="#8c7866" stroke-width="3"/>
</svg>
