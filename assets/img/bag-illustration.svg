<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" role="img" aria-label="Stylized illustration of the Bossababy bag">
  <defs>
    <linearGradient id="bagBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2c42"/>
      <stop offset="100%" stop-color="#2d2233"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#e8c95a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="210" cy="332" rx="150" ry="16" fill="#2d2233" opacity="0.12"/>

  <!-- handles -->
  <path d="M150 120 C150 60, 270 60, 270 120" fill="none" stroke="#2d2233" stroke-width="14" stroke-linecap="round"/>
  <path d="M150 120 C150 66, 270 66, 270 120" fill="none" stroke="#c9a227" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- bag body: structured tote silhouette -->
  <path d="M84 122
           Q82 112 92 112
           L328 112
           Q338 112 336 122
           L322 296
           Q320 322 294 322
           L126 322
           Q100 322 98 296 Z"
        fill="url(#bagBody)"/>

  <!-- top edge trim -->
  <rect x="86" y="110" width="248" height="10" rx="5" fill="#c9a227"/>

  <!-- center zipper / divider hint -->
  <line x1="210" y1="132" x2="210" y2="176" stroke="#c9a227" stroke-width="2.5" stroke-dasharray="1 6" stroke-linecap="round" opacity="0.9"/>

  <!-- front pocket -->
  <path d="M134 200
           Q132 192 142 192
           L278 192
           Q288 192 286 200
           L278 282
           Q276 300 258 300
           L162 300
           Q144 300 142 282 Z"
        fill="#5c4a66" opacity="0.55"/>
  <rect x="142" y="192" width="136" height="6" rx="3" fill="#c9a227" opacity="0.8"/>

  <!-- gold clasp -->
  <circle cx="210" cy="186" r="9" fill="#c9a227"/>
  <circle cx="210" cy="186" r="4" fill="#2d2233"/>

  <!-- subtle shine sweep -->
  <rect x="100" y="118" width="6" height="200" rx="3" fill="url(#shine)" opacity="0.35" transform="rotate(8 103 218)"/>

  <!-- baby charm: tiny heart tag on handle -->
  <line x1="266" y1="116" x2="276" y2="142" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M276 142 c-6 -7 -16 0 -9 8 l9 9 9 -9 c7 -8 -3 -15 -9 -8 Z" fill="#f3dfdb" stroke="#c9a227" stroke-width="2"/>
</svg>
