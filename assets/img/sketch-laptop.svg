<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="Line drawing: laptop sliding into the padded sleeve">
  <g fill="none" stroke="#494b4d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- bag outline, side view -->
    <path d="M80 110 Q78 100 88 100 L332 100 Q342 100 340 110 L330 252 Q328 272 306 272 L114 272 Q92 272 90 252 Z"/>
    <!-- handles -->
    <path d="M150 100 C150 62 270 62 270 100" stroke-width="7"/>
    <!-- sleeve opening -->
    <path d="M110 128 L310 128" stroke="#a18b77" stroke-width="3"/>
    <!-- padding hint: soft inner line -->
    <path d="M104 142 Q210 152 316 142" stroke="#b5a79b" stroke-width="1.8" stroke-dasharray="4 6"/>
    <!-- laptop, half inserted, tilted -->
    <g transform="rotate(-12 210 96)">
      <rect x="140" y="52" width="150" height="96" rx="7" stroke-width="3"/>
      <rect x="152" y="62" width="126" height="70" rx="4" stroke="#a18b77" stroke-width="1.8"/>
    </g>
    <!-- key ring on the side -->
    <circle cx="96" cy="170" r="10" stroke="#a18b77" stroke-width="2.5"/>
    <path d="M96 180 l0 14 m-5 -5 l5 5 l5 -5" stroke="#a18b77" stroke-width="2"/>
    <!-- quilted pocket hint at bottom -->
    <path d="M130 200 L290 200 M150 200 l-10 50 M210 200 l0 52 M270 200 l10 50" stroke="#b5a79b" stroke-width="1.6"/>
  </g>
</svg>
