<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="Line drawing: the bag opened flat like a suitcase">
  <defs>
    <pattern id="mesh" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 12 L12 0 M0 0 L12 12" stroke="#b5a79b" stroke-width="0.8" fill="none" opacity="0.6"/>
    </pattern>
  </defs>
  <g fill="none" stroke="#494b4d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- left half -->
    <path d="M40 60 Q36 52 46 50 L190 42 Q200 41 200 50 L200 250 Q200 259 190 258 L46 250 Q36 249 40 240 Z"/>
    <!-- right half -->
    <path d="M380 60 Q384 52 374 50 L230 42 Q220 41 220 50 L220 250 Q220 259 230 258 L374 250 Q384 249 380 240 Z"/>
    <!-- center hinge -->
    <line x1="210" y1="48" x2="210" y2="252" stroke-dasharray="2 7" stroke-width="2"/>
  </g>
  <!-- mesh pockets -->
  <g>
    <rect x="62" y="78" width="118" height="100" rx="8" fill="url(#mesh)" stroke="#a18b77" stroke-width="2"/>
    <rect x="240" y="78" width="118" height="100" rx="8" fill="url(#mesh)" stroke="#a18b77" stroke-width="2"/>
    <!-- elastic band tops -->
    <line x1="62" y1="92" x2="180" y2="92" stroke="#a18b77" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="240" y1="92" x2="358" y2="92" stroke="#a18b77" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- gold clasp snaps -->
  <g fill="#a18b77" stroke="none">
    <circle cx="80" cy="218" r="5"/>
    <circle cx="160" cy="218" r="5"/>
    <circle cx="260" cy="218" r="5"/>
    <circle cx="340" cy="218" r="5"/>
  </g>
  <g fill="none" stroke="#494b4d" stroke-width="1.8">
    <circle cx="80" cy="218" r="8"/>
    <circle cx="160" cy="218" r="8"/>
    <circle cx="260" cy="218" r="8"/>
    <circle cx="340" cy="218" r="8"/>
  </g>
  <!-- extended zipper tail, bottom right -->
  <path d="M380 240 q14 14 8 30" fill="none" stroke="#a18b77" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="382" y="268" width="8" height="16" rx="3.5" fill="none" stroke="#a18b77" stroke-width="2.2" transform="rotate(20 386 276)"/>
</svg>
